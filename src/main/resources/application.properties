# Server Configuration
server.port=8080
server.address=0.0.0.0

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nayan-db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration
app.jwt.secret=${JWT_SECRET:nayanEyeCareSecretKey2024ForJWTTokenGeneration}
app.jwt.expiration=900000
# PHASE 2: Refresh token lifetime = 7 days (604800000 ms)
app.jwt.refresh-expiration=604800000

# PHASE 5 & 8: Encryption at Rest Secret Key & Rotation
app.encryption.secret-key=${ENCRYPTION_KEY:MySuperSecretEncryptionKey123456}
app.encryption.old-secret-key=${OLD_ENCRYPTION_KEY:}

# CORS Configuration — comma-separated list supports both localhost and LAN network access
app.cors.allowed-origins=http://localhost:5173,http://10.224.3.249:5173,http://10.83.22.35:5173,http://192.168.1.*:5173

# Logging
logging.level.com.nayaneyecare=DEBUG